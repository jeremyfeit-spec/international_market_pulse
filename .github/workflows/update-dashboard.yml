name: Update Market Pulse Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'data.json'
  schedule:
    - cron: '0 17 * * 5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Regenerate dashboard
        run: python update_dashboard.py

      - name: Commit and push updated dashboard
        run: |
          git config user.name "Market Pulse Bot"
          git config user.email "action@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update dashboard $(date +'%Y-%m-%d')"
          git push
