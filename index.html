<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Market Pulse — Competitive Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f11;
    --surface: #14171a;
    --surface2: #1c2026;
    --border: #252a30;
    --border2: #2e343c;
    --text: #e8eaed;
    --muted: #6b7280;
    --subtle: #374151;
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,0.12);
    --green: #10b981;
    --green-dim: rgba(16,185,129,0.12);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.12);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.12);
    --purple: #8b5cf6;
    --purple-dim: rgba(139,92,246,0.12);
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,17,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 600;
    font-size: 15px;
    white-space: nowrap;
    letter-spacing: -0.01em;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2.5s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .badge-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .btn-refresh {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(59,130,246,0.3);
    padding: 5px 12px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-refresh:hover { background: rgba(59,130,246,0.2); }

  /* ── LAYOUT ── */
  .layout {
    display: grid;
    grid-template-columns: 220px 1fr;
    min-height: calc(100vh - 56px);
  }

  /* ── SIDEBAR ── */
  .sidebar {
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 28px;
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    padding: 0 16px;
    margin-bottom: 8px;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 7px 16px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: var(--sans);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.1s;
    text-align: left;
  }
  .filter-btn:hover { color: var(--text); background: var(--surface); }
  .filter-btn.active { color: var(--text); background: var(--surface2); }
  .filter-btn.active .filter-dot { opacity: 1; }

  .filter-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    opacity: 0.35;
    flex-shrink: 0;
  }

  .filter-count {
    margin-left: auto;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--subtle);
  }

  /* ── MAIN ── */
  .main {
    padding: 24px 28px;
    max-width: 900px;
  }

  /* ── SEARCH ── */
  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    align-items: center;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 8px 12px 8px 34px;
    outline: none;
    transition: border-color 0.15s;
    position: relative;
  }
  .search-input:focus { border-color: var(--accent); }

  .search-wrap {
    position: relative;
    flex: 1;
  }
  .search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  .select-filter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    outline: none;
    cursor: pointer;
  }
  .select-filter option { background: var(--surface2); }

  /* ── WEEK TABS ── */
  .week-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }

  .week-tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .week-tab:hover { border-color: var(--border2); color: var(--text); }
  .week-tab.active {
    background: var(--accent-dim);
    border-color: rgba(59,130,246,0.4);
    color: #93c5fd;
  }
  .week-tab .tab-count {
    margin-left: 5px;
    opacity: 0.6;
    font-size: 10px;
  }

  /* ── VIEW TABS ── */
  .view-tabs {
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .view-tab {
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 4px;
    border: 1px solid transparent;
    background: none;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-tab:hover { color: var(--text); background: var(--surface); }
  .view-tab.active {
    color: var(--text);
    background: var(--surface2);
    border-color: var(--border);
  }

  /* ── ARCHIVE TABLE ── */
  .archive-wrap {
    overflow-x: auto;
    margin-top: 4px;
  }
  .archive-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .archive-table th {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--muted);
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-align: left;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  .archive-table th:hover { color: var(--text); }
  .archive-table th .sort-ind { margin-left: 4px; opacity: 0.4; }
  .archive-table th.sorted .sort-ind { opacity: 1; color: var(--accent); }
  .archive-table td {
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    color: var(--text);
    line-height: 1.5;
  }
  .archive-table tr:hover td { background: var(--surface); }
  .archive-table .cell-date { font-family: var(--mono); font-size: 11px; color: var(--muted); white-space: nowrap; }
  .archive-table .cell-company { font-weight: 500; white-space: nowrap; }
  .archive-table .cell-title { max-width: 280px; }
  .archive-table .cell-summary { max-width: 320px; color: var(--muted); font-size: 11px; }
  .archive-table .cell-url a { font-family: var(--mono); font-size: 10px; color: var(--accent); text-decoration: none; opacity: 0.7; }
  .archive-table .cell-url a:hover { opacity: 1; }
  .archive-pagination {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .page-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .page-btn:hover { border-color: var(--border2); }
  .page-btn:disabled { opacity: 0.3; cursor: default; }

  /* ── SORT SELECT ── */
  .sort-select-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }
  .sort-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
  }
  .sort-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 5px 8px;
    outline: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .sort-select:focus { border-color: var(--accent); }
  .sort-select option { background: var(--surface2); }

  /* ── WEEK SECTION ── */
  .week-section {
    margin-bottom: 32px;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .week-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .week-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  .week-count {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--subtle);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 2px 7px;
    border-radius: 3px;
    margin-left: auto;
  }

  /* ── SIGNAL CARD ── */
  .signal-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 8px;
    transition: border-color 0.15s;
    cursor: default;
  }
  .signal-card:hover { border-color: var(--border2); }
  .signal-card.high { border-left: 2px solid var(--accent); }
  .signal-card.hidden { display: none; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 6px;
  }

  .company-link {
    font-weight: 600;
    font-size: 14px;
    color: var(--text);
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .company-link:hover { color: var(--accent); }

  .card-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    margin-left: auto;
    flex-shrink: 0;
  }

  .tag {
    font-family: var(--mono);
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 3px;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }

  .tag-tier-direct    { background: var(--red-dim);    color: #fca5a5; }
  .tag-tier-adjacent  { background: var(--green-dim);  color: #6ee7b7; }
  .tag-tier-ma        { background: var(--amber-dim);  color: #fcd34d; }
  .tag-type           { background: var(--surface2);   color: var(--muted); border: 1px solid var(--border); }
  .tag-high           { background: var(--accent-dim); color: #93c5fd; }
  .tag-region         { background: var(--purple-dim); color: #c4b5fd; }

  .card-headline {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 5px;
    line-height: 1.4;
  }

  .card-summary {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .card-sources {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }

  .source-link {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 0.1s;
  }
  .source-link:hover { opacity: 1; }

  .source-sep {
    color: var(--subtle);
    font-size: 10px;
  }

  /* ── EMPTY STATE ── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-icon { font-size: 32px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-size: 13px; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 24px;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }
  .stat-box:hover { border-color: var(--border2); background: var(--surface2); }
  .stat-box.active {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .stat-box.active .stat-label { color: #93c5fd; }

  .stat-num {
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
  }

  /* ── LOADING ── */
  .loading {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 40px 0;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FEEDBACK BOX ── */
  .feedback-section {
    margin-top: 40px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  .feedback-label {
    font-family: var(--mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .feedback-textarea {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    resize: vertical;
    min-height: 80px;
    transition: border-color 0.15s;
  }
  .feedback-textarea:focus { border-color: var(--accent); }
  .feedback-textarea::placeholder { color: var(--subtle); }

  .feedback-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    align-items: center;
  }

  .btn-submit {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid rgba(59,130,246,0.3);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-submit:hover { background: rgba(59,130,246,0.2); }

  .feedback-hint {
    font-size: 11px;
    color: var(--muted);
  }

  .feedback-saved {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--green);
    display: none;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 700px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .stats-row { grid-template-columns: repeat(2,1fr); }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">
    <div class="logo-dot"></div>
    Market Pulse
  </div>
  <div class="view-tabs">
    <button class="view-tab active" id="tab-signals" onclick="switchView('signals')">Signals</button>
    <button class="view-tab" id="tab-archive" onclick="switchView('archive')">Research Archive</button>
  </div>
  <div class="topbar-right">
    <span class="badge-count" id="totalBadge">— signals</span>
    <button class="btn-refresh" onclick="loadData()">↻ Refresh</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Tier</div>
      <button class="filter-btn active" data-filter="tier" data-value="all" onclick="setFilter('tier','all',this)">
        <span class="filter-dot" style="background:var(--muted)"></span>All tiers
        <span class="filter-count" id="count-tier-all"></span>
      </button>
      <button class="filter-btn" data-filter="tier" data-value="Direct" onclick="setFilter('tier','Direct',this)">
        <span class="filter-dot" style="background:var(--red)"></span>Direct
        <span class="filter-count" id="count-tier-Direct"></span>
      </button>
      <button class="filter-btn" data-filter="tier" data-value="Adjacent" onclick="setFilter('tier','Adjacent',this)">
        <span class="filter-dot" style="background:var(--green)"></span>Adjacent
        <span class="filter-count" id="count-tier-Adjacent"></span>
      </button>
      <button class="filter-btn" data-filter="tier" data-value="M&A Watch" onclick="setFilter('tier','M&A Watch',this)">
        <span class="filter-dot" style="background:var(--amber)"></span>M&A Watch
        <span class="filter-count" id="count-tier-ma"></span>
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Signal type</div>
      <button class="filter-btn active" data-filter="type" data-value="all" onclick="setFilter('type','all',this)">
        <span class="filter-dot" style="background:var(--muted)"></span>All types
      </button>
      <button class="filter-btn" data-filter="type" data-value="Funding" onclick="setFilter('type','Funding',this)">
        <span class="filter-dot" style="background:#34d399"></span>Funding
      </button>
      <button class="filter-btn" data-filter="type" data-value="Product" onclick="setFilter('type','Product',this)">
        <span class="filter-dot" style="background:#60a5fa"></span>Product
      </button>
      <button class="filter-btn" data-filter="type" data-value="Strategy" onclick="setFilter('type','Strategy',this)">
        <span class="filter-dot" style="background:#a78bfa"></span>Strategy
      </button>
      <button class="filter-btn" data-filter="type" data-value="Regulatory" onclick="setFilter('type','Regulatory',this)">
        <span class="filter-dot" style="background:#fb923c"></span>Regulatory
      </button>
      <button class="filter-btn" data-filter="type" data-value="Pricing" onclick="setFilter('type','Pricing',this)">
        <span class="filter-dot" style="background:#f472b6"></span>Pricing
      </button>
      <button class="filter-btn" data-filter="type" data-value="Hiring" onclick="setFilter('type','Hiring',this)">
        <span class="filter-dot" style="background:#facc15"></span>Hiring
      </button>
      <button class="filter-btn" data-filter="type" data-value="M&A Signal" onclick="setFilter('type','M&A Signal',this)">
        <span class="filter-dot" style="background:#f87171"></span>M&A Signal
      </button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-label">Importance</div>
      <button class="filter-btn active" data-filter="importance" data-value="all" onclick="setFilter('importance','all',this)">
        <span class="filter-dot" style="background:var(--muted)"></span>All
      </button>
      <button class="filter-btn" data-filter="importance" data-value="High" onclick="setFilter('importance','High',this)">
        <span class="filter-dot" style="background:var(--accent)"></span>High only
      </button>
    </div>
  </aside>

  <main class="main">

    <div class="stats-row" id="statsRow"></div>

    <div id="weekTabs" class="week-tabs"></div>

    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" type="text" placeholder="Search companies, signals, summaries…" id="searchInput" oninput="applyFilters()">
      </div>
      <div class="sort-select-wrap">
        <span class="sort-label">Sort</span>
        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
          <option value="date-desc">Date ↓ newest</option>
          <option value="date-asc">Date ↑ oldest</option>
          <option value="company-asc">Company A → Z</option>
          <option value="company-desc">Company Z → A</option>
          <option value="importance-desc">Importance ↓</option>
        </select>
      </div>
    </div>

    <div id="content"></div>

    <!-- ── RESEARCH ARCHIVE PANEL ── -->
    <div id="archivePanel" style="display:none;">
      <div class="search-row">
        <div class="search-wrap">
          <span class="search-icon">⌕</span>
          <input class="search-input" type="text" placeholder="Search titles, companies, summaries…" id="archiveSearch" oninput="renderArchive()">
        </div>
        <div class="sort-select-wrap">

async function loadData() {
  if (SHEET_ID === 'YOUR_GOOGLE_SHEET_ID_HERE') {
    allSignals     = SAMPLE_DATA.map(parseRow);
    allRawArticles = SAMPLE_RAW.map(parseRawRow);
    renderAll();
    return;
  }

  document.getElementById('content').innerHTML = '<div class="loading"><div class="spinner"></div>Loading from Google Sheets…</div>';

  try {
    // Load Signals Log
    const url1  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}`;
    const res1  = await fetch(url1);
    const txt1  = await res1.text();
    const json1 = JSON.parse(txt1.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
    const cols1 = json1.table.cols.map(c => c.label);
    allSignals  = json1.table.rows.map(row => {
      const obj = {};
      cols1.forEach((col, i) => { obj[col] = row.c[i] ? (row.c[i].v || '') : ''; });
      return parseRow(obj);
    }).filter(s => s.has_signal);

    // Load Research Archive
    try {
      const url2  = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(RAW_SHEET_NAME)}`;
      const res2  = await fetch(url2);
      const txt2  = await res2.text();
      const json2 = JSON.parse(txt2.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/)[1]);
      const cols2 = json2.table.cols.map(c => c.label);
      allRawArticles = json2.table.rows.map(row => {
        const obj = {};
        cols2.forEach((col, i) => { obj[col] = row.c[i] ? (row.c[i].v || '') : ''; });
        return parseRawRow(obj);
      });
    } catch(e2) {
      allRawArticles = [];
    }

    usingLiveData = true;
    renderAll();
  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">⚠</div><div class="empty-text">Could not load sheet. Check SHEET_ID and ensure the sheet is published.</div></div>';
  }
}

function parseRow(r) {
  const sources = (r.source_urls || r['Source URLs'] || '').toString().split('\n').filter(Boolean);
  return {
    date:        r.date        || r['Date']        || '',
    company:     r.company     || r['Company']     || '',
    website:     r.website     || r['Website']     || '',
    tier:        r.tier        || r['Tier']        || 'Adjacent',
    region:      r.region      || r['Region']      || '',
    signal_type: r.signal_type || r['Signal Type'] || '',
    importance:  r.importance  || r['Importance']  || 'Medium',
    headline:    r.headline    || r['Headline']    || '',
    summary:     r.summary     || r['Summary']     || '',
    source_urls: sources,
    has_signal:  true,
  };
}

function parseRawRow(r) {
  return {
    runDate:     r['Run Date']      || r.run_date      || '',
    articleDate: r['Article Date']  || r.article_date  || '',
    company:     r['Company']       || r.company       || '',
    tier:        r['Tier']          || r.tier          || '',
    category:    r['Category']      || r.category      || '',
    region:      r['Region']        || r.region        || '',
    title:       r['Title']         || r.title         || '',
    summary:     r['Summary']       || r.summary       || '',
    url:         r['URL']           || r.url           || '',
    language:    r['Language']      || r.language      || '',
  };
}

  // Hide the main search row when in archive view (archive has its own)
  const mainSearchRow = document.querySelector('.search-row');
  if (mainSearchRow) mainSearchRow.style.display = view === 'signals' ? '' : 'none';

  if (view === 'archive') {
    archivePage = 1;
    renderArchive();
  }
}

// ─────────────────────────────────────────────────────
// ARCHIVE RENDER
// ─────────────────────────────────────────────────────
function setArchiveSort(descVal, ascVal) {
  const sel = document.getElementById('archiveSortSelect');
  if (sel.value === descVal) {
    sel.value = ascVal;
  } else {
    sel.value = descVal;
  }
  archivePage = 1;
  renderArchive();
}

function renderArchive() {
  const search  = (document.getElementById('archiveSearch').value || '').toLowerCase();
  const sortVal = document.getElementById('archiveSortSelect').value;

  let rows = allRawArticles.filter(function(r) {
    if (!search) return true;
    return (r.company + r.title + r.summary + r.region + r.tier).toLowerCase().includes(search);
  });

  // Sort
  rows = rows.slice().sort(function(a, b) {
    switch(sortVal) {
      case 'article-date-asc':  return a.articleDate < b.articleDate ? -1 : 1;
      case 'article-date-desc': return a.articleDate > b.articleDate ? -1 : 1;
      case 'run-date-desc':     return a.runDate > b.runDate ? -1 : 1;
      case 'company-asc':       return a.company.toLowerCase() < b.company.toLowerCase() ? -1 : 1;
      default:                  return a.articleDate > b.articleDate ? -1 : 1;
    }
  });

  const total   = rows.length;
  const pages   = Math.ceil(total / ARCHIVE_PAGE_SIZE) || 1;
  archivePage   = Math.min(archivePage, pages);
  const start   = (archivePage - 1) * ARCHIVE_PAGE_SIZE;
  const pageRows = rows.slice(start, start + ARCHIVE_PAGE_SIZE);

  // Update sort indicators
  ['date','run','company'].forEach(function(k) {
    const el = document.getElementById('si-' + k);
    if (el) { el.textContent = ''; }
    const h = document.getElementById('ah-' + k);
    if (h) h.classList.remove('sorted');
  });
  if (sortVal.includes('article-date')) {
    const el = document.getElementById('si-date');
    if (el) { el.textContent = sortVal === 'article-date-desc' ? '↓' : '↑'; }
    const h = document.getElementById('ah-date');
    if (h) h.classList.add('sorted');
  } else if (sortVal === 'run-date-desc') {
    const el = document.getElementById('si-run');
    if (el) el.textContent = '↓';
    const h = document.getElementById('ah-run');
    if (h) h.classList.add('sorted');
  } else if (sortVal.includes('company')) {
    const el = document.getElementById('si-company');
    if (el) el.textContent = sortVal === 'company-asc' ? '↑' : '↓';
    const h = document.getElementById('ah-company');
    if (h) h.classList.add('sorted');
  }

  // Build table rows
  const tbody = document.getElementById('archiveTbody');
  if (!tbody) return;

  const tierClass = function(t) {
    return t === 'Direct' ? 'tag-tier-direct' : t === 'Adjacent' ? 'tag-tier-adjacent' : 'tag-tier-ma';
  };

  tbody.innerHTML = pageRows.map(function(r) {
    const shortUrl = r.url ? r.url.replace(/^https?:\/\//, '').substring(0, 30) + (r.url.length > 35 ? '…' : '') : '';
    return `<tr>
      <td class="cell-date">${escHtml(r.articleDate)}</td>
      <td class="cell-date">${escHtml(r.runDate)}</td>
      <td class="cell-company">${escHtml(r.company)}</td>
      <td><span class="tag ${tierClass(r.tier)}" style="font-size:10px;">${escHtml(r.tier)}</span></td>
      <td><span class="tag tag-region" style="font-size:10px;">${escHtml(r.region)}</span></td>
      <td class="cell-title">${escHtml(r.title)}</td>
      <td class="cell-summary">${escHtml(r.summary)}</td>
      <td class="cell-url">${r.url ? `<a href="${escHtml(r.url)}" target="_blank" rel="noopener">${escHtml(shortUrl)}</a>` : ''}</td>
    </tr>`;
  }).join('');

  document.getElementById('pageInfo').textContent    = 'Page ' + archivePage + ' of ' + pages;
  document.getElementById('archiveCount').textContent = total + ' articles';
  document.getElementById('prevPage').disabled        = archivePage <= 1;
  document.getElementById('nextPage').disabled        = archivePage >= pages;
}

function changePage(dir) {
  archivePage += dir;
  renderArchive();
}

// ─────────────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────────────
function renderAll() {
  updateStats();
  buildWeekTabs();
  if (currentView === 'signals') {
    applyFilters();
  } else {
    renderArchive();
  }
}

function updateStats() {
  const high     = allSignals.filter(s => s.importance === 'High').length;
  const ma       = allSignals.filter(s => s.tier === 'M&A Watch').length;
  const weeks    = [...new Set(allSignals.map(s => s.date))].length;

  document.getElementById('totalBadge').textContent          = allSignals.length + ' signals';
  document.getElementById('count-tier-all').textContent      = allSignals.length;
  document.getElementById('count-tier-Direct').textContent   = allSignals.filter(s => s.tier === 'Direct').length;
  document.getElementById('count-tier-Adjacent').textContent = allSignals.filter(s => s.tier === 'Adjacent').length;
  document.getElementById('count-tier-ma').textContent       = ma;

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-box" id="stat-all" onclick="statFilter('all')" title="Show all signals">
      <div class="stat-num">${allSignals.length}</div>
      <div class="stat-label">Total signals</div>
    </div>
    <div class="stat-box" id="stat-high" onclick="statFilter('high')" title="Filter: High importance only">
      <div class="stat-num" style="color:var(--accent)">${high}</div>
      <div class="stat-label">High importance</div>
    </div>
    <div class="stat-box" id="stat-weeks" onclick="statFilter('weeks')" title="Show all weeks">
      <div class="stat-num">${weeks}</div>
      <div class="stat-label">Weeks tracked</div>
    </div>
    <div class="stat-box" id="stat-ma" onclick="statFilter('ma')" title="Filter: M&A Watch only">
      <div class="stat-num">${ma}</div>
      <div class="stat-label">M&amp;A watch signals</div>
    </div>
  `;

  // Re-apply active state if a stat filter is already set
  if (filters._stat) {
    const el = document.getElementById('stat-' + filters._stat);
    if (el) el.classList.add('active');
  }
}

function statFilter(type) {
  // Toggle off if already active
  if (filters._stat === type) {
    filters._stat = null;
    filters.importance = 'all';
    filters.tier = 'all';
    document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active'));
    // Reset sidebar tier buttons too
    document.querySelectorAll('[data-filter="tier"]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="tier"][data-value="all"]').classList.add('active');
    document.querySelectorAll('[data-filter="importance"]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="importance"][data-value="all"]').classList.add('active');
    applyFilters();
    return;
  }

  // Clear all stat box active states
  document.querySelectorAll('.stat-box').forEach(b => b.classList.remove('active'));
  const el = document.getElementById('stat-' + type);
  if (el) el.classList.add('active');

  // Apply the filter
  filters._stat = type;
  if (type === 'high') {
    filters.importance = 'High';
    filters.tier = 'all';
    // Sync sidebar
    document.querySelectorAll('[data-filter="importance"]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="importance"][data-value="High"]').classList.add('active');
    document.querySelectorAll('[data-filter="tier"]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="tier"][data-value="all"]').classList.add('active');
  } else if (type === 'ma') {
    filters.tier = 'M&A Watch';
    filters.importance = 'all';
    // Sync sidebar
    document.querySelectorAll('[data-filter="tier"]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="tier"][data-value="M&A Watch"]').classList.add('active');
    document.querySelectorAll('[data-filter="importance"]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="importance"][data-value="all"]').classList.add('active');
  } else {
    // 'all' or 'weeks' — reset all filters
    filters.importance = 'all';
    filters.tier = 'all';
    document.querySelectorAll('[data-filter="tier"]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="tier"][data-value="all"]').classList.add('active');
    document.querySelectorAll('[data-filter="importance"]').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-filter="importance"][data-value="all"]').classList.add('active');
  }
  applyFilters();
}

function buildWeekTabs() {
  const container = document.getElementById('weekTabs');
  // Get unique dates sorted newest first
  const dates = [...new Set(allSignals.map(s => s.date))].sort().reverse();

  let html = `<button class="week-tab ${activeWeek === 'all' ? 'active' : ''}" onclick="selectWeek('all', this)">
    All weeks <span class="tab-count">${allSignals.length}</span>
  </button>`;

  dates.forEach(d => {
    const count   = allSignals.filter(s => s.date === d).length;
    const label   = formatTabDate(d);
    const isActive = activeWeek === d;
    html += `<button class="week-tab ${isActive ? 'active' : ''}" onclick="selectWeek('${d}', this)">
      ${label} <span class="tab-count">${count}</span>
    </button>`;
  });

  container.innerHTML = html;
}

function formatTabDate(dateStr) {
  // '2026-03-20' → 'Mar 20'
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function selectWeek(week, btn) {
  activeWeek = week;
  document.querySelectorAll('.week-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// ─────────────────────────────────────────────────────
// FILTERS + SORT
// ─────────────────────────────────────────────────────
function applyFilters() {
  const search  = document.getElementById('searchInput').value.toLowerCase();
  const sortVal = document.getElementById('sortSelect').value;

  let filtered = allSignals.filter(s => {
    if (filters.tier !== 'all' && s.tier !== filters.tier) return false;
    if (filters.type !== 'all' && s.signal_type !== filters.type) return false;
    if (filters.importance !== 'all' && s.importance !== filters.importance) return false;
    if (activeWeek !== 'all' && s.date !== activeWeek) return false;
    if (search) {
      const hay = (s.company + s.headline + s.summary + s.signal_type + s.region).toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  // Apply sort
  const impOrder = { High: 0, Medium: 1, Low: 2 };
  filtered = filtered.slice().sort((a, b) => {
    switch(sortVal) {
      case 'date-asc':        return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
      case 'date-desc':       return a.date > b.date ? -1 : a.date < b.date ? 1 : 0;
      case 'company-asc':     return a.company.toLowerCase() < b.company.toLowerCase() ? -1 : 1;
      case 'company-desc':    return a.company.toLowerCase() > b.company.toLowerCase() ? -1 : 1;
      case 'importance-desc': return (impOrder[a.importance] || 1) - (impOrder[b.importance] || 1);
      default:                return a.date > b.date ? -1 : 1;
    }
  });

  renderSignals(filtered, sortVal);
}

function setFilter(key, value, btn) {
  filters[key] = value;
  document.querySelectorAll(`[data-filter="${key}"]`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// ─────────────────────────────────────────────────────
// RENDER SIGNALS
// ─────────────────────────────────────────────────────
function renderSignals(signals, sortVal) {
  if (!signals.length) {
    document.getElementById('content').innerHTML = '<div class="empty"><div class="empty-icon">◈</div><div class="empty-text">No signals match your filters.</div></div>';
    return;
  }

  // For company/importance sorts — show flat list with date badge per card
  // For date sorts — group by week
  const useFlatList = sortVal === 'company-asc' || sortVal === 'company-desc' || sortVal === 'importance-desc';

  let html = '';

  if (useFlatList) {
    html += '<div class="week-section"><div class="week-header"><span class="week-label">' +
            signals.length + ' signal' + (signals.length !== 1 ? 's' : '') + '</span></div>';
    signals.forEach(s => { html += buildCard(s, true); });
    html += '</div>';
  } else {
    // Group by date
    const byDate = {};
    signals.forEach(s => {
      if (!byDate[s.date]) byDate[s.date] = [];
      byDate[s.date].push(s);
    });

    const dates = Object.keys(byDate).sort();
    if (sortVal === 'date-desc') dates.reverse();

    dates.forEach(date => {
      const items = byDate[date];
      // Within each week sort by importance
      items.sort((a, b) => {
        const imp = { High: 0, Medium: 1, Low: 2 };
        return (imp[a.importance] || 1) - (imp[b.importance] || 1);
      });

      html += `<div class="week-section">
        <div class="week-header">
          <span class="week-label">Week of ${date}</span>
          <span class="week-count">${items.length} signal${items.length !== 1 ? 's' : ''}</span>
        </div>`;
      items.forEach(s => { html += buildCard(s, false); });
      html += '</div>';
    });
  }

  document.getElementById('content').innerHTML = html;
}

function buildCard(s, showDate) {
  const tierClass = s.tier === 'Direct' ? 'tag-tier-direct' : s.tier === 'Adjacent' ? 'tag-tier-adjacent' : 'tag-tier-ma';
  const isHigh    = s.importance === 'High';
  const companyEl = s.website
    ? `<a class="company-link" href="${s.website}" target="_blank" rel="noopener">${escHtml(s.company)}</a>`
    : `<span class="company-link">${escHtml(s.company)}</span>`;

  const sources = s.source_urls.map((url, i) => {
    const label = s.source_urls.length > 1 ? `source ${i+1}` : 'source';
    return `<a class="source-link" href="${url}" target="_blank" rel="noopener">${label}</a>`;
  }).join('<span class="source-sep"> · </span>');

  const dateBadge = showDate
    ? `<span class="tag tag-type" style="margin-left:auto;">${escHtml(s.date)}</span>`
    : '';

  return `<div class="signal-card ${isHigh ? 'high' : ''}">
    <div class="card-top">
      ${companyEl}
      <div class="card-meta">
        <span class="tag tag-type">${escHtml(s.signal_type)}</span>
        <span class="tag ${tierClass}">${escHtml(s.tier)}</span>
        ${s.region ? `<span class="tag tag-region">${escHtml(s.region)}</span>` : ''}
        ${isHigh ? `<span class="tag tag-high">High</span>` : ''}
        ${dateBadge}
      </div>
    </div>
    <div class="card-headline">${escHtml(s.headline)}</div>
    <div class="card-summary">${escHtml(s.summary)}</div>
    ${sources ? `<div class="card-sources">${sources}</div>` : ''}
  </div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────
// FEEDBACK
// ─────────────────────────────────────────────────────
function saveFeedback() {
  const text = document.getElementById('feedbackText').value.trim();
  if (!text) return;
  localStorage.setItem('marketpulse_feedback', text);
  const saved = document.getElementById('feedbackSaved');
  saved.style.display = 'inline';
  setTimeout(() => { saved.style.display = 'none'; }, 2500);
}

// Load saved feedback on open
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('marketpulse_feedback');
  if (saved) document.getElementById('feedbackText').value = saved;
  loadData();
});
</script>
